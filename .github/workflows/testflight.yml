name: TestFlight

# Builds the app on a macOS runner and uploads it to TestFlight.
# Trigger: push a version tag (e.g. `git tag v1.0.0 && git push --tags`) or run manually.
#
# Signing uses a persistent distribution certificate when provided (so the ephemeral runners
# reuse ONE cert instead of minting a new one each build — which piled up to Apple's cert limit),
# and falls back to fully automatic "cloud" signing otherwise. Provisioning profiles are still
# managed automatically via the App Store Connect API key (-allowProvisioningUpdates).
#
# One-time setup (see docs/TESTFLIGHT.md) — required repo secrets:
#   APPLE_TEAM_ID        your 10-char Team ID (portal → Membership)
#   ASC_KEY_ID           App Store Connect API key ID
#   ASC_ISSUER_ID        App Store Connect API issuer ID
#   ASC_KEY_P8_BASE64    the API key (.p8) file, base64  (`base64 -w0 AuthKey_XXXX.p8`)
# Optional but recommended (avoids the certificate-limit problem):
#   APPLE_DIST_CERT_P12_BASE64   an Apple Distribution cert + key as .p12, base64
#   APPLE_DIST_CERT_PASSWORD     the .p12 export password

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (e.g. 1.0.0)"
        default: "1.0.0"

jobs:
  testflight:
    runs-on: macos-26        # ships Xcode 26 / the iOS 26 SDK the app targets
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install xtool
        run: brew install xtool-org/tap/xtool

      # Turn the SwiftPM package (library products) into an archivable Xcode project.
      - name: Generate Xcode project
        run: xtool dev generate-xcode-project

      # xtool writes an .xcworkspace under xtool/ (the project lives in xtool/.xtool-tmp/).
      # The app target/scheme is "<product>-App" (a bare "<product>" scheme is the SwiftPM
      # library product, which archives empty).
      - name: Locate workspace & scheme
        run: |
          WORKSPACE=$(ls -d xtool/*.xcworkspace | head -1)
          PRODUCT=$(grep -E '^product:' xtool.yml | awk '{print $2}')
          echo "WORKSPACE=$WORKSPACE"     >> "$GITHUB_ENV"
          echo "SCHEME=${PRODUCT}-App"    >> "$GITHUB_ENV"
          echo "Using workspace=$WORKSPACE scheme=${PRODUCT}-App"
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null || true

      # xtool doesn't wire iconPath into the generated project, so the archive ships without
      # an asset-catalog app icon (App Store requires CFBundleIconName + a 120x120 icon).
      # Attach the committed Assets.xcassets (AppIcon) to the app target here.
      - name: Add app icon asset catalog
        run: |
          gem install xcodeproj --no-document --quiet
          PROJ=$(ls -d xtool/.xtool-tmp/*.xcodeproj | head -1)
          ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open(ARGV[0])
            target = proj.targets.find { |t| t.name == ARGV[1] } or abort "target #{ARGV[1]} not found"
            ref = proj.main_group.new_file(File.join(Dir.pwd, "Assets.xcassets"))
            target.resources_build_phase.add_file_reference(ref, true)
            target.build_configurations.each { |c| c.build_settings["ASSETCATALOG_COMPILER_APPICON_NAME"] = "AppIcon" }
            proj.save
            puts "attached Assets.xcassets to #{target.name}"
          ' "$PROJ" "$SCHEME"

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            MARKETING="${GITHUB_REF_NAME#v}"
          else
            MARKETING="${{ github.event.inputs.marketing_version }}"
          fi
          echo "marketing=$MARKETING"     >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version $MARKETING ($GITHUB_RUN_NUMBER)"

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          mkdir -p ~/.appstoreconnect/private_keys
          cp "$RUNNER_TEMP/asc.p8" ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # Import a persistent Apple Distribution certificate into a temporary keychain so automatic
      # signing REUSES it instead of minting a fresh certificate on every ephemeral runner — those
      # orphaned certs piled up until the account hit Apple's certificate limit. Skipped (falls back
      # to cloud-managed signing) when the APPLE_DIST_CERT_P12_BASE64 secret isn't set.
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No APPLE_DIST_CERT_P12_BASE64 secret set — using cloud-managed signing."
            exit 0
          fi
          CERT="$RUNNER_TEMP/dist.p12"
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KP="$(openssl rand -base64 24)"
          echo "$P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KP" "$KEYCHAIN" >/dev/null
          # make xcodebuild search this keychain first, keeping the runner's defaults too
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"
          echo "Imported distribution certificate:"
          security find-identity -v -p codesigning "$KEYCHAIN" | sed -n 's/.*"\(.*\)".*/  \1/p'

      # Archive WITH automatic (cloud) signing so each target's CODE_SIGN_ENTITLEMENTS — notably
      # the App Group — is baked into the signed binaries. An unsigned archive + sign-on-export
      # dropped the App Group entitlement (the extension then couldn't reach the shared container).
      # Force the "Apple Distribution" identity: xtool's generated project defaults the targets to
      # Development signing, so an archive otherwise provisions a *development* certificate per
      # ephemeral runner — those pile up to Apple's certificate limit. Distribution signing reuses
      # our imported persistent cert + App Store profiles and creates no new certs.
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath build/Rhizome.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.ver.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}"

      - name: Write export options
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Rhizome.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -t ios \
            -f "$(ls build/export/*.ipa | head -1)" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      - name: Save IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Rhizome-ipa
          path: build/export/*.ipa
          if-no-files-found: ignore
