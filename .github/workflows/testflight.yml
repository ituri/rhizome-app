name: TestFlight

# Builds the app on a macOS runner and uploads it to TestFlight.
# Trigger: push a version tag (e.g. `git tag v1.0.0 && git push --tags`) or run manually.
#
# Signing is fully automatic (Xcode "cloud" signing) via an App Store Connect API key —
# no distribution certificate or provisioning profiles to create/export by hand.
#
# One-time setup (see docs/TESTFLIGHT.md) — add these four repo secrets:
#   APPLE_TEAM_ID        your 10-char Team ID (portal → Membership)
#   ASC_KEY_ID           App Store Connect API key ID
#   ASC_ISSUER_ID        App Store Connect API issuer ID
#   ASC_KEY_P8_BASE64    the API key (.p8) file, base64  (`base64 -w0 AuthKey_XXXX.p8`)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (e.g. 1.0.0)"
        default: "1.0.0"

jobs:
  testflight:
    runs-on: macos-26        # ships Xcode 26 / the iOS 26 SDK the app targets
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install xtool
        run: brew install xtool-org/tap/xtool

      # Turn the SwiftPM package (library products) into an archivable Xcode project.
      - name: Generate Xcode project
        run: xtool dev generate-xcode-project

      # xtool writes an .xcworkspace under xtool/ (the project lives in xtool/.xtool-tmp/).
      # The app target/scheme is "<product>-App" (a bare "<product>" scheme is the SwiftPM
      # library product, which archives empty).
      - name: Locate workspace & scheme
        run: |
          WORKSPACE=$(ls -d xtool/*.xcworkspace | head -1)
          PRODUCT=$(grep -E '^product:' xtool.yml | awk '{print $2}')
          echo "WORKSPACE=$WORKSPACE"     >> "$GITHUB_ENV"
          echo "SCHEME=${PRODUCT}-App"    >> "$GITHUB_ENV"
          echo "Using workspace=$WORKSPACE scheme=${PRODUCT}-App"
          xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null || true

      - name: Compute version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            MARKETING="${GITHUB_REF_NAME#v}"
          else
            MARKETING="${{ github.event.inputs.marketing_version }}"
          fi
          echo "marketing=$MARKETING"     >> "$GITHUB_OUTPUT"
          echo "build=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version $MARKETING ($GITHUB_RUN_NUMBER)"

      - name: Write App Store Connect API key
        run: |
          echo "${{ secrets.ASC_KEY_P8_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/asc.p8"
          mkdir -p ~/.appstoreconnect/private_keys
          cp "$RUNNER_TEMP/asc.p8" ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      # Archive unsigned — signing the embedded extension at archive time is flaky with
      # automatic signing on CI. The export step re-signs the whole bundle (app + appex)
      # in one coordinated pass.
      - name: Archive
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath build/Rhizome.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.ver.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}"

      - name: Write export options
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Rhizome.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -t ios \
            -f "$(ls build/export/*.ipa | head -1)" \
            --apiKey "${{ secrets.ASC_KEY_ID }}" \
            --apiIssuer "${{ secrets.ASC_ISSUER_ID }}"

      - name: Save IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Rhizome-ipa
          path: build/export/*.ipa
          if-no-files-found: ignore
